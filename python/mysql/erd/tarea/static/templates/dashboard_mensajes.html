<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ede8;
      --surface: #ffffff;
      --border: #c8c3bc;
      --text: #1a1815;
      --muted: #6b6560;
      --accent: #2d5be3;
      --accent-hover: #1a44c8;
      --danger: #d63b3b;
      --row-hover: #f7f5f2;
      --radius: 6px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow), 0 0 0 1px var(--border);
      overflow: hidden;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .btn:hover { background: var(--accent-hover); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 0.65rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      font-weight: 600;
      color: var(--text);
      font-size: 0.85rem;
    }

    tbody td {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    tbody tr:hover td { background: var(--row-hover); }

    .actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: var(--muted);
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
    }

    .icon-btn:hover { color: var(--text); background: var(--bg); }
    .icon-btn.delete:hover { color: var(--danger); }

    svg { width: 16px; height: 16px; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .badge-admin { background: #dce6fb; color: #1a44c8; }
    .badge-user  { background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>
