<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión / Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #d9d9d9;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 30px 0;
    }

    h2 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 13px;
      margin-bottom: 2px;
      display: block;
    }

    .form-control-wire {
      width: 160px;
      height: 22px;
      border: 2px solid #000;
      border-radius: 0;
      background: #fff;
      font-size: 12px;
      padding: 1px 4px;
      outline: none;
      display: block;
    }

    .form-control-wire:focus {
      outline: none;
      box-shadow: none;
      border-color: #000;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field-row label {
      min-width: 110px;
      font-size: 13px;
      margin: 0;
    }

    .btn-wire {
      border: 2px solid #000;
      border-radius: 0;
      background: #fff;
      font-size: 12px;
      font-family: Arial, sans-serif;
      padding: 3px 14px;
      cursor: pointer;
      box-shadow: 3px 3px 0 #000;
      color: #000;
    }

    .btn-wire:hover {
      background: #f0f0f0;
    }

    .btn-wire:active {
      box-shadow: 1px 1px 0 #000;
      transform: translate(2px, 2px);
    }

    .col-left {
      padding-left: 30px;
      padding-right: 40px;
    }

    .col-right {
      padding-left: 40px;
      padding-right: 30px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .col-right .section-inner {
      display: inline-block;
    }

    .divider {
      border-left: 1px solid #aaa;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row" style="min-height: 100vh; align-items: flex-start; padding-top: 10px;">

      <!-- Columna Izquierda: Inicio de Sesión -->
      <div class="col-6 col-left">
        <h2>Inicio de Sesión</h2>

        <div class="field-row">
          <label>E-mail</label>
          <input type="email" class="form-control-wire" />
        </div>

        <div class="field-row">
          <label>Contraseña</label>
          <input type="password" class="form-control-wire" />
        </div>

        <div style="margin-top: 10px;">
          <button class="btn-wire">Iniciar Sesión</button>
        </div>
      </div>

      <!-- Columna Derecha: Registro -->
      <div class="col-6 col-right divider">
        <div class="section-inner">
          <h2>Registro</h2>

          <div class="field-row">
            <label>Nombre</label>
            <input type="text" class="form-control-wire" />
          </div>

          <div class="field-row">
            <label>E-mail</label>
            <input type="email" class="form-control-wire" />
          </div>

          <div class="field-row">
            <label>Contraseña</label>
            <input type="password" class="form-control-wire" />
          </div>

          <div class="field-row">
            <label>Conf. Contraseña</label>
            <input type="password" class="form-control-wire" />
          </div>

          <div style="margin-top: 10px; display: flex; justify-content: flex-end;">
            <button class="btn-wire">Registrar</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
